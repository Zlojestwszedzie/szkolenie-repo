name: "04 - Using Actions: Docker"

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: "Checkout"
              uses: actions/checkout@v4

            - name: "Setup docker"
              uses: docker/setup-buildx-action@v3

            - name: "Build docker image"
              working-directory: docker-app
              run: |
                set -eux
                IMAGE_TAG=my-nginx:${GITHUB_SHA}
                docker build -t "${IMAGE_TAG}" .
                echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

            - name: "Run container"
              run: |
                set -eux
                CID=$(docker run -t -p 8080:80 "${IMAGE_TAG}")
                echo "CID=${CID}" >> "$GITHUB_ENV"

            - name: "Wait for nginx"
              run: |
                set -eux
                until curl -s http://localhost:8080; do sleep 1; done

            - name: "Test page"
              run: |
                set -eux
                curl -s http://localhost:8080

            - name: "Cleanup"
              if: always()
              run: |
                set -eux
                if [ -n "${CID:-}" ]; then
                    docker logs "$CID" || true
                    docker rm -f "$CID" || true
                fi